name: seguimiento-ci-pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Build & Test - Seguimiento
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest app/ -v --tb=short
        continue-on-error: true

      - name: Build Docker image (verify)
        run: |
          docker build -t emplea-humboldt/seguimiento:ci-${{ github.sha }} .
