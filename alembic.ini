# Configuración de Alembic para el microservicio de Autenticación y Usuarios.
# La URL de la base de datos NO se define aquí: se inyecta en migrations/env.py
# desde app.config.get_settings() (misma fuente que la app), para no duplicar
# credenciales ni perder el driver async (postgresql+asyncpg).

[alembic]
script_location = migrations
prepend_sys_path = .
# Formato de los archivos de versión: 0001_descripcion, 0002_descripcion, ...
# (el slug lo define cada revisión manualmente).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
